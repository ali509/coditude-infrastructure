name: Infrastructure Validation

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: infrastructure-validation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cloudformation:
    name: CloudFormation checks
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install CloudFormation linter
        run: python -m pip install "cfn-lint==1.53.0"

      - name: Install CloudFormation Guard
        run: cargo install cfn-guard --version 3.2.0 --locked

      - name: Lint CloudFormation templates
        run: make infra-lint

      - name: Evaluate CloudFormation Guard policies
        run: make infra-guard
