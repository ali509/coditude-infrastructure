AWSTemplateFormatVersion: "2010-09-09"

Description: >
  Creates the GitHub Actions OIDC provider and separate deployment roles used
  by the Coditude application and infrastructure repositories.

Parameters:
  GitHubSubject:
    Type: String
    Default: >-
      repo:ali509@39634565/coditude-application@1302738965:environment:dev
    Description: Exact GitHub OIDC subject allowed to assume the role.

  InfrastructureGitHubSubject:
    Type: String
    Default: >-
      repo:ali509@39634565/coditude-infrastructure@1302771122:environment:dev
    Description: Exact infrastructure repository OIDC subject allowed to deploy.

  ProjectName:
    Type: String
    Default: coditude

  Environment:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - staging
      - prod

Resources:
  GitHubOidcProvider:
    Type: AWS::IAM::OIDCProvider
    Properties:
      ClientIdList:
        - sts.amazonaws.com
      Tags:
        - Key: Project
          Value: coditude
        - Key: ManagedBy
          Value: cloudformation
      Url: https://token.actions.githubusercontent.com

  InfrastructureCloudFormationExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - cloudformation.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - !Sub "arn:${AWS::Partition}:iam::aws:policy/PowerUserAccess"
      Policies:
        - PolicyName: ManageCoditudeIamResources
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - iam:AddRoleToInstanceProfile
                  - iam:AttachRolePolicy
                  - iam:CreateInstanceProfile
                  - iam:CreateRole
                  - iam:DeleteInstanceProfile
                  - iam:DeleteRole
                  - iam:DeleteRolePolicy
                  - iam:DetachRolePolicy
                  - iam:GetInstanceProfile
                  - iam:GetRole
                  - iam:GetRolePolicy
                  - iam:ListAttachedRolePolicies
                  - iam:ListRolePolicies
                  - iam:PassRole
                  - iam:PutRolePolicy
                  - iam:RemoveRoleFromInstanceProfile
                  - iam:TagInstanceProfile
                  - iam:TagRole
                  - iam:UntagInstanceProfile
                  - iam:UntagRole
                  - iam:UpdateAssumeRolePolicy
                Resource:
                  - !Sub
                    - "arn:${AWS::Partition}:iam::${AWS::AccountId}:role/${Project}-${Stage}-*"
                    - Project: !Ref ProjectName
                      Stage: !Ref Environment
                  - !Sub
                    - "arn:${AWS::Partition}:iam::${AWS::AccountId}:instance-profile/${Project}-${Stage}-*"
                    - Project: !Ref ProjectName
                      Stage: !Ref Environment
              - Effect: Allow
                Action:
                  - iam:CreateServiceLinkedRole
                Resource: "*"
                Condition:
                  StringEquals:
                    iam:AWSServiceName:
                      - autoscaling.amazonaws.com
                      - ecs.application-autoscaling.amazonaws.com
                      - elasticloadbalancing.amazonaws.com
                      - rds.amazonaws.com
      Tags:
        - Key: Project
          Value: coditude
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: cloudformation

  GitHubInfrastructureDeploymentRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Federated: !Ref GitHubOidcProvider
            Action:
              - sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
                token.actions.githubusercontent.com:sub: !Ref InfrastructureGitHubSubject
      MaxSessionDuration: 3600
      Policies:
        - PolicyName: DeployInfrastructureStacks
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - cloudformation:CreateChangeSet
                  - cloudformation:DeleteChangeSet
                  - cloudformation:DescribeChangeSet
                  - cloudformation:DescribeStackEvents
                  - cloudformation:DescribeStacks
                  - cloudformation:ExecuteChangeSet
                  - cloudformation:GetTemplateSummary
                Resource: !Sub
                  - "arn:${AWS::Partition}:cloudformation:${AWS::Region}:${AWS::AccountId}:stack/${Project}-${Stage}-*/*"
                  - Project: !Ref ProjectName
                    Stage: !Ref Environment
              - Effect: Allow
                Action:
                  - iam:PassRole
                Resource: !GetAtt InfrastructureCloudFormationExecutionRole.Arn
                Condition:
                  StringEquals:
                    iam:PassedToService: cloudformation.amazonaws.com
      Tags:
        - Key: Project
          Value: coditude
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: cloudformation

  GitHubDeploymentRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Federated: !Ref GitHubOidcProvider
            Action:
              - sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
                token.actions.githubusercontent.com:sub: !Ref GitHubSubject
      MaxSessionDuration: 3600
      Policies:
        - PolicyName: PublishApplicationImages
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - ecr:GetAuthorizationToken
                Resource: "*"
              - Effect: Allow
                Action:
                  - ecr:BatchCheckLayerAvailability
                  - ecr:BatchGetImage
                  - ecr:CompleteLayerUpload
                  - ecr:GetDownloadUrlForLayer
                  - ecr:InitiateLayerUpload
                  - ecr:PutImage
                  - ecr:UploadLayerPart
                Resource: !Sub
                  - "arn:${AWS::Partition}:ecr:${AWS::Region}:${AWS::AccountId}:repository/${Project}/${Stage}/*"
                  - Project: !Ref ProjectName
                    Stage: !Ref Environment
        - PolicyName: DeployContainerApplication
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - cloudformation:CreateChangeSet
                  - cloudformation:DeleteChangeSet
                  - cloudformation:DescribeChangeSet
                  - cloudformation:DescribeStackEvents
                  - cloudformation:DescribeStacks
                  - cloudformation:ExecuteChangeSet
                  - cloudformation:GetTemplateSummary
                Resource:
                  - !Sub
                    - "arn:${AWS::Partition}:cloudformation:${AWS::Region}:${AWS::AccountId}:stack/${Project}-${Stage}-*/*"
                    - Project: !Ref ProjectName
                      Stage: !Ref Environment
              - Effect: Allow
                Action:
                  - iam:CreateRole
                  - iam:DeleteRole
                  - iam:DeleteRolePolicy
                  - iam:GetRole
                  - iam:PutRolePolicy
                  - iam:TagRole
                  - iam:UntagRole
                Resource: !Sub
                  - "arn:${AWS::Partition}:iam::${AWS::AccountId}:role/${Project}-${Stage}-container-application-*"
                  - Project: !Ref ProjectName
                    Stage: !Ref Environment
              - Effect: Allow
                Action:
                  - iam:PassRole
                Resource: !Sub
                  - "arn:${AWS::Partition}:iam::${AWS::AccountId}:role/${Project}-${Stage}-container-*"
                  - Project: !Ref ProjectName
                    Stage: !Ref Environment
                Condition:
                  StringEquals:
                    iam:PassedToService: ecs-tasks.amazonaws.com
              - Effect: Allow
                Action:
                  - iam:CreateServiceLinkedRole
                Resource: "*"
                Condition:
                  StringEquals:
                    iam:AWSServiceName:
                      - ecs.application-autoscaling.amazonaws.com
                      - elasticloadbalancing.amazonaws.com
              - Effect: Allow
                Action:
                  - application-autoscaling:DeleteScalingPolicy
                  - application-autoscaling:DeregisterScalableTarget
                  - application-autoscaling:DescribeScalableTargets
                  - application-autoscaling:DescribeScalingActivities
                  - application-autoscaling:DescribeScalingPolicies
                  - application-autoscaling:PutScalingPolicy
                  - application-autoscaling:RegisterScalableTarget
                  - cloudwatch:DeleteAlarms
                  - cloudwatch:DescribeAlarms
                  - cloudwatch:PutMetricAlarm
                  - ec2:DescribeSecurityGroups
                  - ec2:DescribeSubnets
                  - ec2:DescribeVpcs
                  - ecs:CreateService
                  - ecs:DeleteService
                  - ecs:DeregisterTaskDefinition
                  - ecs:DescribeClusters
                  - ecs:DescribeServices
                  - ecs:DescribeTaskDefinition
                  - ecs:ListTagsForResource
                  - ecs:RegisterTaskDefinition
                  - ecs:TagResource
                  - ecs:UntagResource
                  - ecs:UpdateService
                  - elasticloadbalancing:AddTags
                  - elasticloadbalancing:CreateListener
                  - elasticloadbalancing:CreateRule
                  - elasticloadbalancing:CreateLoadBalancer
                  - elasticloadbalancing:CreateTargetGroup
                  - elasticloadbalancing:DeleteListener
                  - elasticloadbalancing:DeleteRule
                  - elasticloadbalancing:DeleteLoadBalancer
                  - elasticloadbalancing:DeleteTargetGroup
                  - elasticloadbalancing:DescribeListeners
                  - elasticloadbalancing:DescribeLoadBalancers
                  - elasticloadbalancing:DescribeRules
                  - elasticloadbalancing:DescribeTargetGroups
                  - elasticloadbalancing:DescribeTargetHealth
                  - elasticloadbalancing:DescribeTags
                  - elasticloadbalancing:ModifyLoadBalancerAttributes
                  - elasticloadbalancing:ModifyListener
                  - elasticloadbalancing:ModifyTargetGroup
                  - elasticloadbalancing:ModifyTargetGroupAttributes
                  - elasticloadbalancing:RemoveTags
                  - elasticloadbalancing:SetSecurityGroups
                  - elasticloadbalancing:SetSubnets
                  - servicediscovery:CreateService
                  - servicediscovery:DeleteService
                  - servicediscovery:GetNamespace
                  - servicediscovery:GetOperation
                  - servicediscovery:GetService
                  - servicediscovery:ListTagsForResource
                  - servicediscovery:TagResource
                  - servicediscovery:UntagResource
                Resource: "*"
        - PolicyName: DeployEc2Application
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                Resource: !Sub
                  - "arn:${AWS::Partition}:s3:::${Project}-${Stage}-ec2-platform-deploymentartifactbucket-*/releases/*"
                  - Project: !Ref ProjectName
                    Stage: !Ref Environment
              - Effect: Allow
                Action:
                  - codedeploy:CreateDeployment
                  - codedeploy:GetDeployment
                  - codedeploy:GetDeploymentGroup
                  - codedeploy:UpdateDeploymentGroup
                Resource: !Sub
                  - "arn:${AWS::Partition}:codedeploy:${AWS::Region}:${AWS::AccountId}:deploymentgroup:${Project}-${Stage}-*/${Project}-${Stage}-*"
                  - Project: !Ref ProjectName
                    Stage: !Ref Environment
              - Effect: Allow
                Action:
                  - codedeploy:GetDeploymentConfig
                Resource: !Sub "arn:${AWS::Partition}:codedeploy:${AWS::Region}:${AWS::AccountId}:deploymentconfig:*"
              - Effect: Allow
                Action:
                  - codedeploy:RegisterApplicationRevision
                Resource: !Sub
                  - "arn:${AWS::Partition}:codedeploy:${AWS::Region}:${AWS::AccountId}:application:${Project}-${Stage}-*"
                  - Project: !Ref ProjectName
                    Stage: !Ref Environment
      Tags:
        - Key: Project
          Value: coditude
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: cloudformation

Outputs:
  GitHubDeploymentRoleArn:
    Description: Application deployment role configured in the GitHub environment.
    Value: !GetAtt GitHubDeploymentRole.Arn

  GitHubOidcProviderArn:
    Description: GitHub Actions OIDC provider ARN.
    Value: !Ref GitHubOidcProvider

  GitHubInfrastructureDeploymentRoleArn:
    Description: Infrastructure repository role configured in the GitHub environment.
    Value: !GetAtt GitHubInfrastructureDeploymentRole.Arn

  InfrastructureCloudFormationExecutionRoleArn:
    Description: Service role used by CloudFormation for infrastructure updates.
    Value: !GetAtt InfrastructureCloudFormationExecutionRole.Arn
