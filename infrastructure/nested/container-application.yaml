AWSTemplateFormatVersion: "2010-09-09"

Description: >
  Deploys the Coditude Next.js frontend and FastAPI backend as ECS Fargate
  services behind a public Application Load Balancer. The backend is privately
  discoverable and connects to PostgreSQL in isolated database subnets.

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: Deployment configuration
        Parameters:
          - ProjectName
          - Environment
          - VpcId
          - PublicSubnetIds
          - ApplicationSubnetIds
          - PublicLoadBalancerSecurityGroupId
          - FrontendSecurityGroupId
          - BackendSecurityGroupId
          - DatabaseEndpointAddress
          - DatabaseEndpointPort
          - DatabaseName
          - DatabaseMasterUserSecretArn
          - ClusterArn
          - ClusterName
          - FrontendRepositoryUri
          - BackendRepositoryUri
          - FrontendLogGroupName
          - BackendLogGroupName
          - TaskExecutionRoleArn
          - PrivateDnsNamespaceId
      - Label:
          default: Application release
        Parameters:
          - FrontendImageTag
          - BackendImageTag
          - CertificateArn
      - Label:
          default: Service scaling
        Parameters:
          - FrontendDesiredCount
          - FrontendMaximumCount
          - BackendDesiredCount
          - BackendMaximumCount

Parameters:
  ProjectName:
    Type: String
    Default: coditude
    AllowedPattern: "^[a-z][a-z0-9-]{2,20}$"

  Environment:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - staging
      - prod

  VpcId:
    Type: AWS::EC2::VPC::Id

  PublicSubnetIds:
    Type: List<AWS::EC2::Subnet::Id>

  ApplicationSubnetIds:
    Type: List<AWS::EC2::Subnet::Id>

  PublicLoadBalancerSecurityGroupId:
    Type: AWS::EC2::SecurityGroup::Id

  FrontendSecurityGroupId:
    Type: AWS::EC2::SecurityGroup::Id

  BackendSecurityGroupId:
    Type: AWS::EC2::SecurityGroup::Id

  DatabaseEndpointAddress:
    Type: String

  DatabaseEndpointPort:
    Type: String
    Default: "5432"

  DatabaseName:
    Type: String

  DatabaseMasterUserSecretArn:
    Type: String

  ClusterArn:
    Type: String

  ClusterName:
    Type: String

  FrontendRepositoryUri:
    Type: String

  BackendRepositoryUri:
    Type: String

  FrontendLogGroupName:
    Type: String

  BackendLogGroupName:
    Type: String

  TaskExecutionRoleArn:
    Type: String

  PrivateDnsNamespaceId:
    Type: String

  FrontendImageTag:
    Type: String
    Default: initial
    AllowedPattern: "^[a-zA-Z0-9][a-zA-Z0-9._-]{0,127}$"
    Description: Immutable frontend image tag already pushed to ECR.

  BackendImageTag:
    Type: String
    Default: initial
    AllowedPattern: "^[a-zA-Z0-9][a-zA-Z0-9._-]{0,127}$"
    Description: Immutable backend image tag already pushed to ECR.

  CertificateArn:
    Type: String
    Default: ""
    Description: >
      Optional ACM certificate ARN. When omitted, dev traffic uses HTTP.
      Production must supply a certificate.

  FrontendDesiredCount:
    Type: Number
    Default: 1
    MinValue: 1
    MaxValue: 10

  FrontendMaximumCount:
    Type: Number
    Default: 3
    MinValue: 1
    MaxValue: 20

  BackendDesiredCount:
    Type: Number
    Default: 1
    MinValue: 1
    MaxValue: 10

  BackendMaximumCount:
    Type: Number
    Default: 3
    MinValue: 1
    MaxValue: 20

Rules:
  ProductionRequiresCertificate:
    RuleCondition: !Equals
      - !Ref Environment
      - prod
    Assertions:
      - Assert: !Not
          - !Equals
            - !Ref CertificateArn
            - ""
        AssertDescription: Production requires an ACM certificate.

Conditions:
  HasCertificate: !Not
    - !Equals
      - !Ref CertificateArn
      - ""

Resources:
  ApplicationTaskRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: ecs-exec-messages
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - ssmmessages:CreateControlChannel
                  - ssmmessages:CreateDataChannel
                  - ssmmessages:OpenControlChannel
                  - ssmmessages:OpenDataChannel
                Resource: "*"
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: cloudformation

  BackendTaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - !Sub "arn:${AWS::Partition}:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy"
      Policies:
        - PolicyName: read-rds-managed-secret
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: secretsmanager:GetSecretValue
                Resource: !Ref DatabaseMasterUserSecretArn
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: cloudformation

  PublicLoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      IpAddressType: ipv4
      LoadBalancerAttributes:
        - Key: deletion_protection.enabled
          Value: "false"
        - Key: idle_timeout.timeout_seconds
          Value: "60"
        - Key: routing.http.drop_invalid_header_fields.enabled
          Value: "true"
      Scheme: internet-facing
      SecurityGroups:
        - !Ref PublicLoadBalancerSecurityGroupId
      Subnets: !Ref PublicSubnetIds
      Type: application
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-${Environment}-public-alb"
        - Key: Project
          Value: coditude
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: cloudformation

  FrontendTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      HealthCheckEnabled: true
      HealthCheckIntervalSeconds: 30
      HealthCheckPath: /api/health
      HealthCheckPort: traffic-port
      HealthCheckProtocol: HTTP
      HealthCheckTimeoutSeconds: 5
      HealthyThresholdCount: 2
      Matcher:
        HttpCode: 200-399
      Port: 3000
      Protocol: HTTP
      TargetGroupAttributes:
        - Key: deregistration_delay.timeout_seconds
          Value: "30"
      TargetType: ip
      UnhealthyThresholdCount: 2
      VpcId: !Ref VpcId

  HttpListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      DefaultActions: !If
        - HasCertificate
        - - Type: redirect
            RedirectConfig:
              Port: "443"
              Protocol: HTTPS
              StatusCode: HTTP_301
        - - Type: forward
            TargetGroupArn: !Ref FrontendTargetGroup
      LoadBalancerArn: !Ref PublicLoadBalancer
      Port: 80
      Protocol: HTTP

  HttpsListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Condition: HasCertificate
    Properties:
      Certificates:
        - CertificateArn: !Ref CertificateArn
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref FrontendTargetGroup
      LoadBalancerArn: !Ref PublicLoadBalancer
      Port: 443
      Protocol: HTTPS
      SslPolicy: ELBSecurityPolicy-TLS13-1-2-2021-06

  BackendDiscoveryService:
    Type: AWS::ServiceDiscovery::Service
    Properties:
      Description: Private DNS discovery for the backend ECS service
      DnsConfig:
        DnsRecords:
          - TTL: 10
            Type: A
        NamespaceId: !Ref PrivateDnsNamespaceId
        RoutingPolicy: MULTIVALUE
      HealthCheckCustomConfig:
        FailureThreshold: 1
      Name: backend
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: cloudformation

  FrontendTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      ContainerDefinitions:
        - Name: frontend
          Essential: true
          Environment:
            - Name: BACKEND_URL
              Value: !Sub "http://backend.${Environment}.${ProjectName}.internal:8000"
          HealthCheck:
            Command:
              - CMD-SHELL
              - >-
                node -e "fetch('http://127.0.0.1:3000/api/health').then(r =>
                { if (!r.ok) process.exit(1) }).catch(() => process.exit(1))"
            Interval: 30
            Retries: 3
            StartPeriod: 15
            Timeout: 5
          Image: !Sub
            - "${RepositoryUri}:${ImageTag}"
            - RepositoryUri: !Ref FrontendRepositoryUri
              ImageTag: !Ref FrontendImageTag
          LinuxParameters:
            InitProcessEnabled: true
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref FrontendLogGroupName
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: frontend
              mode: blocking
          PortMappings:
            - ContainerPort: 3000
              Name: frontend-http
              Protocol: tcp
          StopTimeout: 30
      Cpu: "512"
      ExecutionRoleArn: !Ref TaskExecutionRoleArn
      Family: !Sub "${ProjectName}-${Environment}-frontend"
      Memory: "1024"
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      RuntimePlatform:
        CpuArchitecture: X86_64
        OperatingSystemFamily: LINUX
      TaskRoleArn: !GetAtt ApplicationTaskRole.Arn
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: cloudformation

  BackendTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      ContainerDefinitions:
        - Name: backend
          Essential: true
          Environment:
            - Name: APP_ENV
              Value: !Ref Environment
            - Name: DB_HOST
              Value: !Ref DatabaseEndpointAddress
            - Name: DB_PORT
              Value: !Ref DatabaseEndpointPort
            - Name: DB_NAME
              Value: !Ref DatabaseName
            - Name: DB_POOL_MAX_SIZE
              Value: "5"
          HealthCheck:
            Command:
              - CMD-SHELL
              - >-
                python -c "import urllib.request;
                urllib.request.urlopen('http://127.0.0.1:8000/health')"
            Interval: 30
            Retries: 3
            StartPeriod: 15
            Timeout: 5
          Image: !Sub
            - "${RepositoryUri}:${ImageTag}"
            - RepositoryUri: !Ref BackendRepositoryUri
              ImageTag: !Ref BackendImageTag
          LinuxParameters:
            InitProcessEnabled: true
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref BackendLogGroupName
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: backend
              mode: blocking
          PortMappings:
            - ContainerPort: 8000
              Name: backend-http
              Protocol: tcp
          Secrets:
            - Name: DB_USERNAME
              ValueFrom:
                Fn::Join:
                  - ":"
                  - - !Ref DatabaseMasterUserSecretArn
                    - username
                    - ""
                    - ""
            - Name: DB_PASSWORD
              ValueFrom:
                Fn::Join:
                  - ":"
                  - - !Ref DatabaseMasterUserSecretArn
                    - password
                    - ""
                    - ""
          StopTimeout: 30
      Cpu: "512"
      ExecutionRoleArn: !GetAtt BackendTaskExecutionRole.Arn
      Family: !Sub "${ProjectName}-${Environment}-backend"
      Memory: "1024"
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      RuntimePlatform:
        CpuArchitecture: X86_64
        OperatingSystemFamily: LINUX
      TaskRoleArn: !GetAtt ApplicationTaskRole.Arn
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: cloudformation

  BackendService:
    Type: AWS::ECS::Service
    Properties:
      CapacityProviderStrategy:
        - Base: 1
          CapacityProvider: FARGATE
          Weight: 1
      Cluster: !Ref ClusterArn
      DeploymentConfiguration:
        DeploymentCircuitBreaker:
          Enable: true
          Rollback: true
        MaximumPercent: 200
        MinimumHealthyPercent: 100
      DesiredCount: !Ref BackendDesiredCount
      EnableExecuteCommand: true
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: DISABLED
          SecurityGroups:
            - !Ref BackendSecurityGroupId
          Subnets: !Ref ApplicationSubnetIds
      PlatformVersion: LATEST
      PropagateTags: SERVICE
      ServiceName: !Sub "${ProjectName}-${Environment}-backend"
      ServiceRegistries:
        - RegistryArn: !GetAtt BackendDiscoveryService.Arn
      TaskDefinition: !Ref BackendTaskDefinition
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: cloudformation

  FrontendService:
    Type: AWS::ECS::Service
    DependsOn:
      - HttpListener
      - BackendService
    Properties:
      CapacityProviderStrategy:
        - Base: 1
          CapacityProvider: FARGATE
          Weight: 1
      Cluster: !Ref ClusterArn
      DeploymentConfiguration:
        DeploymentCircuitBreaker:
          Enable: true
          Rollback: true
        MaximumPercent: 200
        MinimumHealthyPercent: 100
      DesiredCount: !Ref FrontendDesiredCount
      EnableExecuteCommand: true
      HealthCheckGracePeriodSeconds: 60
      LoadBalancers:
        - ContainerName: frontend
          ContainerPort: 3000
          TargetGroupArn: !Ref FrontendTargetGroup
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: DISABLED
          SecurityGroups:
            - !Ref FrontendSecurityGroupId
          Subnets: !Ref ApplicationSubnetIds
      PlatformVersion: LATEST
      PropagateTags: SERVICE
      ServiceName: !Sub "${ProjectName}-${Environment}-frontend"
      TaskDefinition: !Ref FrontendTaskDefinition
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: cloudformation

  FrontendScalableTarget:
    Type: AWS::ApplicationAutoScaling::ScalableTarget
    Properties:
      MaxCapacity: !Ref FrontendMaximumCount
      MinCapacity: !Ref FrontendDesiredCount
      ResourceId: !Sub
        - "service/${ClusterName}/${ServiceName}"
        - ClusterName: !Ref ClusterName
          ServiceName: !GetAtt FrontendService.Name
      ScalableDimension: ecs:service:DesiredCount
      ServiceNamespace: ecs

  FrontendCpuScalingPolicy:
    Type: AWS::ApplicationAutoScaling::ScalingPolicy
    Properties:
      PolicyName: !Sub "${ProjectName}-${Environment}-frontend-cpu"
      PolicyType: TargetTrackingScaling
      ScalingTargetId: !Ref FrontendScalableTarget
      TargetTrackingScalingPolicyConfiguration:
        PredefinedMetricSpecification:
          PredefinedMetricType: ECSServiceAverageCPUUtilization
        ScaleInCooldown: 120
        ScaleOutCooldown: 60
        TargetValue: 60

  BackendScalableTarget:
    Type: AWS::ApplicationAutoScaling::ScalableTarget
    Properties:
      MaxCapacity: !Ref BackendMaximumCount
      MinCapacity: !Ref BackendDesiredCount
      ResourceId: !Sub
        - "service/${ClusterName}/${ServiceName}"
        - ClusterName: !Ref ClusterName
          ServiceName: !GetAtt BackendService.Name
      ScalableDimension: ecs:service:DesiredCount
      ServiceNamespace: ecs

  BackendCpuScalingPolicy:
    Type: AWS::ApplicationAutoScaling::ScalingPolicy
    Properties:
      PolicyName: !Sub "${ProjectName}-${Environment}-backend-cpu"
      PolicyType: TargetTrackingScaling
      ScalingTargetId: !Ref BackendScalableTarget
      TargetTrackingScalingPolicyConfiguration:
        PredefinedMetricSpecification:
          PredefinedMetricType: ECSServiceAverageCPUUtilization
        ScaleInCooldown: 120
        ScaleOutCooldown: 60
        TargetValue: 60

  FrontendUnhealthyHostsAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: Frontend ECS targets are unhealthy behind the ALB.
      ComparisonOperator: GreaterThanThreshold
      Dimensions:
        - Name: LoadBalancer
          Value: !GetAtt PublicLoadBalancer.LoadBalancerFullName
        - Name: TargetGroup
          Value: !GetAtt FrontendTargetGroup.TargetGroupFullName
      EvaluationPeriods: 2
      MetricName: UnHealthyHostCount
      Namespace: AWS/ApplicationELB
      Period: 60
      Statistic: Maximum
      Threshold: 0
      TreatMissingData: notBreaching

  FrontendHighCpuAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: Frontend ECS service CPU remains above 80 percent.
      ComparisonOperator: GreaterThanThreshold
      Dimensions:
        - Name: ClusterName
          Value: !Ref ClusterName
        - Name: ServiceName
          Value: !GetAtt FrontendService.Name
      EvaluationPeriods: 3
      MetricName: CPUUtilization
      Namespace: AWS/ECS
      Period: 60
      Statistic: Average
      Threshold: 80
      TreatMissingData: notBreaching

  BackendHighCpuAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: Backend ECS service CPU remains above 80 percent.
      ComparisonOperator: GreaterThanThreshold
      Dimensions:
        - Name: ClusterName
          Value: !Ref ClusterName
        - Name: ServiceName
          Value: !GetAtt BackendService.Name
      EvaluationPeriods: 3
      MetricName: CPUUtilization
      Namespace: AWS/ECS
      Period: 60
      Statistic: Average
      Threshold: 80
      TreatMissingData: notBreaching

Outputs:
  ApplicationUrl:
    Description: Public application URL.
    Value: !If
      - HasCertificate
      - !Sub "https://${PublicLoadBalancer.DNSName}"
      - !Sub "http://${PublicLoadBalancer.DNSName}"

  LoadBalancerDnsName:
    Description: Public DNS name of the Application Load Balancer.
    Value: !GetAtt PublicLoadBalancer.DNSName

  FrontendServiceName:
    Description: Name of the frontend ECS service.
    Value: !GetAtt FrontendService.Name

  BackendServiceName:
    Description: Name of the backend ECS service.
    Value: !GetAtt BackendService.Name

  FrontendTaskDefinitionArn:
    Description: ARN of the frontend task definition revision.
    Value: !Ref FrontendTaskDefinition

  BackendTaskDefinitionArn:
    Description: ARN of the backend task definition revision.
    Value: !Ref BackendTaskDefinition
